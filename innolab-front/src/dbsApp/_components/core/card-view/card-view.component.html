<ng-container [ngSwitch]="card.type">
  <ng-container *ngSwitchCase="'team'">
    <ng-container *ngTemplateOutlet="teamCard"></ng-container>
  </ng-container>
  <ng-container *ngSwitchCase="'project'">
    <ng-container *ngTemplateOutlet="projectCard"></ng-container>
  </ng-container>
</ng-container>


<ng-template #teamCard>
  <mat-card class="card-view card-team">

    <mat-card-header>
      <div class="d-flex flex-column full-width align-items-center bottom-puffer-25">
        <figure class="d-flex justify-content-center margin-0">
          <img mat-card-image src="{{card.avatar ? card.avatar : defaultAvatarSrc}}" alt="" class="card-team-avatar margin-0" width="150px" height="150px">
        </figure>
      </div>
    </mat-card-header>

    <mat-card-content class="left-padding-15">
      <h4 class="card-team-title text-center">
        <ng-container *ngTemplateOutlet="card.title && card.title.url ? isLink : isNotLink; context: {$implicit: card.title}"></ng-container>
      </h4>
      <ng-container *ngIf="card.shortDesc">
        <h5 class="font-size-1 text-secondary card-team-short-desc">{{card.shortDesc}}</h5>
      </ng-container>

      <ng-container *ngFor="let info of card.infos">
        <div class="row card-team-desc">
          <ng-container *ngIf="info.icon">
            <mat-icon class=" right-puffer-15">{{info.icon}}</mat-icon>
          </ng-container>
          <ng-container *ngTemplateOutlet="info.url ? isLink : isNotLink; context: {$implicit: info}"></ng-container>
        </div>
      </ng-container>

    </mat-card-content>
    <mat-card-actions>
      <!--
      <button mat-button>LIKE</button>
      <button mat-button>SHARE</button>
      -->
    </mat-card-actions>
  </mat-card>
</ng-template>

<ng-template #projectCard>
  <mat-card class="card-view card-project">

    <mat-card-header>
      <div class="d-flex flex-column full-width align-items-center top-puffer-10 bottom-puffer-25">
        <figure class="d-flex justify-content-center margin-0">
          <img mat-card-image src="{{card.avatar ? card.avatar : defaultAvatarSrc}}" alt="" class="card-project-avatar">
        </figure>
      </div>
    </mat-card-header>

    <mat-card-content class="left-padding-15">
      <h5 class="card-project-title text-center">
        <ng-container *ngTemplateOutlet="card.title && card.title.url ? isLink : isNotLink; context: {$implicit: card.title}"></ng-container>
      </h5>
      <ng-container *ngIf="card.shortDesc">
        <markdown class="font-size-1 text-secondary card-project-short-desc text-left">{{card.shortDesc}}</markdown>
        <div>
          <button mat-raised-button> read more </button>
        </div>
      </ng-container>

    </mat-card-content>
    <mat-card-actions>
      <!--
      <button mat-button>LIKE</button>
      <button mat-button>SHARE</button>
      -->
    </mat-card-actions>
  </mat-card>
</ng-template>

<ng-template #elemntCnt let-element>

</ng-template>

<ng-template #isLink let-element>
  <a href="{{element.url}}">{{element.text}}</a>
</ng-template>

<ng-template #isNotLink let-element>
  {{element.text}}
</ng-template>
